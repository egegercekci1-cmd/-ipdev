<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders & Ödev Takip - Portal</title>

<!-- Firebase SDK'leri -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #43cea2, #185a9d);
  color: white;
  min-height: 100vh;
}
header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
}
.card {
  background: white;
  color: #333;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}
button.action {
  background: #185a9d;
  color: white;
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
}
button.action:hover {
  background: #14467c;
}
.auth-box {
  background: white;
  color: #333;
  padding: 30px;
  border-radius: 20px;
  max-width: 400px;
  margin: 50px auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
.hidden {
  display: none !important;
}
.badge {
  background: #ff4757;
  color: white;
  padding: 4px 10px;
  border-radius: 10px;
  font-size: 12px;
}
</style>
</head>

<body>

<!-- GİRİŞ / KAYIT EKRANI -->
<div id="authScreen" class="auth-box">
  <h2 style="text-align:center; color:#185a9d;">Giriş Yap / Kayıt Ol</h2>
  
  <label>E-Posta</label>
  <input type="email" id="email" placeholder="ornek@okul.com">

  <label>Şifre</label>
  <input type="password" id="sifre" placeholder="******">

  <div id="registerFields" class="hidden">
    <label>Hesap Türü</label>
    <select id="rol">
      <option value="ogrenci">Öğrenci</option>
      <option value="ogretmen">Öğretmen</option>
    </select>
  </div>

  <button class="action" onclick="girisYap()">Giriş Yap</button>
  <button class="action" style="background:#2ed573; margin-top:10px;" onclick="kayitOlModalToggle()">Kayıt Ol / Mod Değiştir</button>
</div>

<!-- ANA UYGULAMA EKRANI -->
<div id="appScreen" class="hidden">
  <header>
    📚 Ders & Ödev Takip 
    <span id="userRoleBadge" class="badge"></span>
    <button onclick="cikisYap()" style="float:right; background:#ff4757; color:white; border:none; padding:5px 10px; border-radius:10px; cursor:pointer;">Çıkış</button>
  </header>

  <div class="container">
    <!-- ÖĞRETMEN PANELİ: ÖDEV ATAMA -->
    <div id="ogretmenPanel" class="card hidden">
      <h3>👨‍🏫 Öğrenciye Ödev Ata</h3>
      <label>Öğrenci E-Posta</label>
      <input type="text" id="hedefOgrenci" placeholder="ogrenci@okul.com">
      
      <label>Ders</label>
      <input type="text" id="ovDers" placeholder="Matematik">

      <label>Ödev Açıklaması</label>
      <textarea id="ovAciklama" placeholder="Test 4 çözülecek"></textarea>

      <label>Teslim Tarihi</label>
      <input type="date" id="ovTarih">

      <button class="action" onclick="odevAta()">Ödevi Gönder</button>
    </div>

    <!-- ÖĞRENCİ PANELİ: BANA GELEN ÖDEVLER -->
    <div id="ogrenciPanel" class="card">
      <h3>📝 Bana Atanan Ödevler</h3>
      <div id="ogrenciOdevListesi">
        <p style="color:#666;">Yükleniyor...</p>
      </div>
    </div>
  </div>
</div>

<script>
  // 🔥 BURAYA KENDİ FIREBASE BİLGİLERİNİ EKLEDİK:
  const firebaseConfig = {
    databaseURL: "https://ders-takip-e395b-default-rtdb.firebaseio.com"
  };

  // Firebase'i Başlat
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;

  function kayitOlModalToggle() {
    document.getElementById("registerFields").classList.toggle("hidden");
  }

  function girisYap() {
    const email = document.getElementById("email").value.trim();
    const sifre = document.getElementById("sifre").value;
    const registerAçıkmi = !document.getElementById("registerFields").classList.contains("hidden");

    if(!email || !sifre) return alert("Lütfen alanları doldurun!");

    let rol = "ogrenci";
    if(registerAçıkmi) {
      rol = document.getElementById("rol").value;
    } else {
      if(email.includes("ogretmen")) rol = "ogretmen";
    }

    currentUser = { email: email.replace(/\./g, '_'), orijinalEmail: email, rol };
    localStorage.setItem("currentUser", JSON.stringify(currentUser));
    ekranKontrol();
  }

  function cikisYap() {
    localStorage.removeItem("currentUser");
    currentUser = null;
    ekranKontrol();
  }

  function ekranKontrol() {
    if(currentUser) {
      document.getElementById("authScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");
      document.getElementById("userRoleBadgeinnerText" || "userRoleBadge").innerText = currentUser.rol.toUpperCase();

      if(currentUser.rol === "ogretmen") {
        document.getElementById("ogretmenPanel").classList.remove("hidden");
        document.getElementById("ogrenciPanel").classList.add("hidden");
      } else {
        document.getElementById("ogretmenPanel").classList.add("hidden");
        document.getElementById("ogrenciPanel").classList.remove("hidden");
        ogrenciOdevleriniGetir();
      }
    } else {
      document.getElementById("authScreen").classList.remove("hidden");
      document.getElementById("appScreen").classList.add("hidden");
    }
  }

  function odevAta() {
    const hedef = document.getElementById("hedefOgrenci").value.trim().replace(/\./g, '_');
    const ders = document.getElementById("ovDers").value.trim();
    const aciklama = document.getElementById("ovAciklama").value.trim();
    const tarih = document.getElementById("ovTarih").value;

    if(!hedef || !ders || !tarih) return alert("Eksik alan bırakmayın!");

    // Realtime Database'e gönder
    db.ref('odevler/' + hedef).push({
      ders,
      aciklama,
      tarih,
      atananOgretmen: currentUser.orijinalEmail
    });

    alert("Ödev başarıyla öğrenciye atandı!");
    
    document.getElementById("hedefOgrenci").value = "";
    document.getElementById("ovDers").value = "";
    document.getElementById("ovAciklama").value = "";
    document.getElementById("ovTarih").value = "";
  }

  function ogrenciOdevleriniGetir() {
    const listeDiv = document.getElementById("ogrenciOdevListesi");
    const ogrenciKey = currentUser.email;

    // Realtime Database'den anlık olarak dinle
    db.ref('odevler/' + ogrenciKey).on('value', (snapshot) => {
      const data = snapshot.val();
      
      if(!data) {
        listeDiv.innerHTML = `<p style="color:#666;">Size atanmış yeni bir ödev bulunmuyor.</p>`;
        return;
      }

      listeDiv.innerHTML = "";
      Object.values(data).forEach(o => {
        listeDiv.innerHTML += `
          <div style="background:#f9f9f9; padding:12px; border-radius:10px; margin-bottom:10px; border-left:4px solid #185a9d; color:#333;">
            <b>📚 ${o.ders}</b> <span style="font-size:12px; color:#666;">(Öğretmen: ${o.atananOgretmen})</span><br>
            <p style="margin: 5px 0;">${o.aciklama}</p>
            <small>📅 Teslim: ${o.tarih}</small>
          </div>
        `;
      });
    });
  }

  ekranKontrol();
</script>

</body>
</html>
