<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders & Ödev Takip - Portal</title>

<!-- Firebase SDK'leri -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #43cea2, #185a9d);
  color: white;
  min-height: 100vh;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 15px;
}

.card {
  background: white;
  color: #333;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

label {
  font-weight: bold;
  font-size: 14px;
  color: #444;
  display: block;
  margin-top: 10px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  font-size: 14px;
}

button.action {
  background: #185a9d;
  color: white;
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
  transition: background 0.3s;
}

button.action:hover {
  background: #14467c;
}

.auth-box {
  background: white;
  color: #333;
  padding: 30px;
  border-radius: 20px;
  max-width: 400px;
  margin: 60px auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.hidden {
  display: none !important;
}

.badge {
  background: #ff4757;
  color: white;
  padding: 4px 10px;
  border-radius: 10px;
  font-size: 12px;
  vertical-align: middle;
}

.odev-card {
  background: #fdfdfd;
  border: 1px solid #eee;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
  border-left: 5px solid #185a9d;
}

.odev-card.done {
  opacity: 0.6;
  border-left-color: #2ed573;
  text-decoration: line-through;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.15);
  padding: 10px 20px;
}
</style>
</head>

<body>

<!-- GİRİŞ EKRANI -->
<div id="authScreen" class="auth-box">
  <h2 style="text-align:center; color:#185a9d; margin-top:0;">Ders & Ödev Takip</h2>
  
  <div id="step1">
    <label>E-Posta Adresin (Gmail vb.)</label>
    <input type="email" id="email" placeholder="ornek@gmail.com">

    <label>Giriş Rolü (İlk Kayıtta Belirlenir)</label>
    <select id="rol">
      <option value="ogrenci">Öğrenciyim</option>
      <option value="ogretmen">Öğretmenim</option>
    </select>

    <button class="action" onclick="kodGonder()">Doğrulama Kodu Gönder</button>
  </div>

  <div id="step2" class="hidden">
    <p style="color:#565656; font-size:13px; text-align:center;">E-posta adresinize gönderilen 4 haneli doğrulama kodunu girin:</p>
    <label>Doğrulama Kodu</label>
    <input type="text" id="girilenKod" placeholder="Örn: 1234" maxlength="4">

    <button class="action" onclick="kodAtaVeGirisYap()">Kodu Onayla ve Giriş Yap</button>
  </div>
</div>

<!-- ANA UYGULAMA EKRANI -->
<div id="appScreen" class="hidden">
  <div class="top-bar">
    <span>📚 Portal <span id="userRoleBadge" class="badge"></span></span>
    <button onclick="cikisYap()" style="background:#ff4757; color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer; font-weight:bold;">Çıkış Yap</button>
  </div>

  <div class="container">
    
    <!-- ÖĞRETMEN PANELİ -->
    <div id="ogretmenPanel" class="card hidden">
      <h3 style="color:#185a9d; margin-top:0;">👨‍🏫 Öğrenciye Ödev Gönder</h3>
      
      <label>Öğrencinin E-Postası (Gmail vb.)</label>
      <input type="email" id="hedefOgrenci" placeholder="ogrenci@gmail.com">
      
      <label>Ders Adı</label>
      <input type="text" id="ovDers" placeholder="Örn: Matematik">

      <label>Ödev Detayı / Açıklama</label>
      <textarea id="ovAciklama" placeholder="Sayfa 20-25 çözülecek"></textarea>

      <label>Teslim Tarihi</label>
      <input type="date" id="ovTarih">

      <button class="action" onclick="odevAta()">Ödevi Gönder 🚀</button>

      <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
      
      <h3 style="color:#185a9d;">📊 Gönderdiğim Ödevlerin Durumu</h3>
      <div id="ogretmenTakipListesi">
        <p style="color:#666;">Yükleniyor...</p>
      </div>
    </div>

    <!-- ÖĞRENCİ PANELİ -->
    <div id="ogrenciPanel" class="card hidden">
      <h3 style="color:#185a9d; margin-top:0;">📝 Bana Gelen Ödevler</h3>
      <div id="ogrenciOdevListesi">
        <p style="color:#666;">Yükleniyor...</p>
      </div>
    </div>

  </div>
</div>

<script>
  const firebaseConfig = {
    databaseURL: "https://ders-takip-e395b-default-rtdb.firebaseio.com"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;
  let uretilenKod = "";
  let geciciEmail = "";
  let geciciRol = "";

  function epostaGecerliMi(email) {
    // Gmail, Hotmail, Outlook dahil tüm standart e-posta formatlarını destekler
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return re.test(email);
  }

  function kodGonder() {
    const email = document.getElementById("email").value.trim().toLowerCase();
    const rol = document.getElementById("rol").value;

    if(!email) return alert("Lütfen e-posta adresini gir!");
    if(!epostaGecerliMi(email)) return alert("Geçersiz e-posta formatı! Lütfen geçerli bir e-posta (örn: gmail.com) girin.");

    const emailKey = email.replace(/\./g, '_').replace(/[@]/g, '_');

    db.ref('kullanicilar/' + emailKey).once('value', (snapshot) => {
      const kayitliKullanici = snapshot.val();

      if(kayitliKullanici && kayitliKullanici.rol !== rol) {
        return alert(`Bu hesap daha önce "${kayitliKullanici.rol.toUpperCase()}" olarak kaydedilmiş! Rolü değiştiremezsiniz.`);
      }

      uretilenKod = Math.floor(1000 + Math.random() * 9000).toString();
      geciciEmail = email;
      geciciRol = rol;

      alert(`[SİMÜLASYON MAİLİ] Doğrulama Kodunuz: ${uretilenKod}`);

      document.getElementById("step1").classList.add("hidden");
      document.getElementById("step2").classList.remove("hidden");
    });
  }

  function kodAtaVeGirisYap() {
    const girilen = document.getElementById("girilenKod").value.trim();

    if(girilen !== uretilenKod) {
      return alert("Hatalı doğrulama kodu! Lütfen tekrar deneyin.");
    }

    const emailKey = geciciEmail.replace(/\./g, '_').replace(/[@]/g, '_');

    db.ref('kullanicilar/' + emailKey).set({
      email: geciciEmail,
      rol: geciciRol
    });

    currentUser = { 
      emailClean: emailKey, 
      email: geciciEmail, 
      rol: geciciRol 
    };
    
    localStorage.setItem("currentUser", JSON.stringify(currentUser));
    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step1").classList.remove("hidden");
    document.getElementById("girilenKod").value = "";
    document.getElementById("email").value = "";
    
    ekranKontrol();
  }

  function cikisYap() {
    localStorage.removeItem("currentUser");
    currentUser = null;
    ekranKontrol();
  }

  function ekranKontrol() {
    if(currentUser) {
      document.getElementById("authScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");
      document.getElementById("userRoleBadge").innerText = currentUser.rol === "ogretmen" ? "ÖĞRETMEN" : "ÖĞRENCİ";

      if(currentUser.rol === "ogretmen") {
        document.getElementById("ogretmenPanel").classList.remove("hidden");
        document.getElementById("ogrenciPanel").classList.add("hidden");
        ogretmenTakipGetir();
      } else {
        document.getElementById("ogretmenPanel").classList.add("hidden");
        document.getElementById("ogrenciPanel").classList.remove("hidden");
        ogrenciOdevleriniGetir();
      }
    } else {
      document.getElementById("authScreen").classList.remove("hidden");
      document.getElementById("appScreen").classList.add("hidden");
    }
  }

  function odevAta() {
    const hedefEmail = document.getElementById("hedefOgrenci").value.trim().toLowerCase();
    const ders = document.getElementById("ovDers").value.trim();
    const aciklama = document.getElementById("ovAciklama").value.trim();
    const tarih = document.getElementById("ovTarih").value;

    if(!hedefEmail || !ders || !tarih) return alert("Lütfen boş alan bırakma!");
    if(!epostaGecerliMi(hedefEmail)) return alert("Geçersiz öğrenci e-postası!");

    const hedefKey = hedefEmail.replace(/\./g, '_').replace(/[@]/g, '_');

    db.ref('odevler/' + hedefKey).push({
      ders,
      aciklama,
      tarih,
      ogretmen: currentUser.email,
      tamamlandi: false
    });

    alert("Ödev başarıyla öğrenciye iletildi!");
    document.getElementById("hedefOgrenci").value = "";
    document.getElementById("ovDers").value = "";
    document.getElementById("ovAciklama").value = "";
    document.getElementById("ovTarih").value = "";
  }

  function ogrenciOdevleriniGetir() {
    const listeDiv = document.getElementById("ogrenciOdevListesi");
    db.ref('odevler/' + currentUser.emailClean).on('value', (snapshot) => {
      const data = snapshot.val();
      if(!data) {
        listeDiv.innerHTML = `<p style="color:#666; text-align:center;">Harika, şu an hiç ödevin yok! 🎉</p>`;
        return;
      }

      listeDiv.innerHTML = "";
      Object.keys(data).forEach(odevId => {
        const o = data[odevId];
        listeDiv.innerHTML += `
          <div class="odev-card ${o.tamamlandi ? 'done' : ''}">
            <b style="font-size:16px; color:#185a9d;">📚 ${o.ders}</b> 
            <span style="font-size:11px; color:#666; float:right;">Veren: ${o.ogretmen}</span><br>
            <p style="margin:8px 0; color:#333;">${o.aciklama || 'Açıklama yok'}</p>
            <small style="color:#555;">📅 Teslim Tarihi: ${o.tarih}</small><br><br>
            <button onclick="odevDurumDegistir('${odevId}', ${!o.tamamlandi})" style="background:${o.tamamlandi ? '#ffa502' : '#2ed573'}; color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer; font-weight:bold;">
              ${o.tamamlandi ? '↩️ Geri Al' : '✅ Tamamlandı İşaretle'}
            </button>
          </div>
        `;
      });
    });
  }

  function ogretmenTakipGetir() {
    const takipDiv = document.getElementById("ogretmenTakipListesi");
    db.ref('odevler').on('value', (snapshot) => {
      const tumVeriler = snapshot.val();
      if(!tumVeriler) {
        takipDiv.innerHTML = `<p style="color:#666;">Henüz kimseye ödev gönderilmedi.</p>`;
        return;
      }

      takipDiv.innerHTML = "";
      let toplamOdevSayisi = 0;

      Object.keys(tumVeriler).forEach(ogrenciKey => {
        const ogrenciOdevleri = tumVeriler[ogrenciKey];
        Object.keys(ogrenciOdevleri).forEach(odevId => {
          const o = ogrenciOdevleri[odevId];
          if(o.ogretmen === currentUser.email) {
            toplamOdevSayisi++;
            takipDiv.innerHTML += `
              <div style="background:#f8f9fa; padding:10px; border-radius:10px; margin-bottom:8px; border-left:4px solid ${o.tamamlandi ? '#2ed573' : '#ff4757'}; color:#333;">
                <b style="color:#185a9d;">Öğrenci:</b> ${ogrenciKey.replaceAll('_','.')}<br>
                <b>Ders:</b> ${o.ders} | <b>Teslim:</b> ${o.tarih}<br>
                <b>Durum:</b> <span style="font-weight:bold; color:${o.tamamlandi ? '#2ed573' : '#ff4757'}">${o.tamamlandi ? '✅ Tamamlandı' : '⏳ Yapılıyor'}</span>
              </div>
            `;
          }
        });
      });

      if(toplamOdevSayisi === 0) {
        takipDiv.innerHTML = `<p style="color:#666;">Henüz hiç ödev göndermediniz.</p>`;
      }
    });
  }

  function odevDurumDegistir(odevId, yeniDurum) {
    db.ref('odevler/' + currentUser.emailClean + '/' + odevId).update({
      tamamlandi: yeniDurum
    });
  }

  ekranKontrol();
</script>

</body>
</html>
